<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Call Analyzer{% endblock %}</title>
    <link rel="icon" href="data:,">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <style>
        [htmx-indicator] { display: none; }
        .htmx-request [htmx-indicator] { display: inline-block; }
        .htmx-request.htmx-indicator { display: inline-block; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">
    <nav class="bg-white shadow">
        <div class="max-w-7xl mx-auto px-4 py-3 flex items-center justify-between">
            <a href="{{ base_path }}/" class="text-xl font-bold text-gray-800">Call Analyzer</a>
            <div class="flex gap-4">
                <a href="{{ base_path }}/" class="text-gray-600 hover:text-gray-900">Upload</a>
                <a href="{{ base_path }}/calls" class="text-gray-600 hover:text-gray-900">Calls</a>
                <a href="{{ base_path }}/profiles" class="text-gray-600 hover:text-gray-900">Profiles</a>
            </div>
        </div>
    </nav>
    <main class="max-w-7xl mx-auto px-4 py-8">
        {% block content %}{% endblock %}
    </main>
</body>
</html>
